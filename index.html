/* ── Capacity model ──────────────────────────────────────────────
   Known segments/day at peer centers (provided): Sibiu 32, Alba 30, Călărași 27.
   Case-mix weights from sheet 04 (diagnostic exams): Spine 38, Abdomen&pelvis 22, Limbs 21, Head&neck 20.
   Per region, scale each peer's known seg/day by the relative scan speed there
   (peer time / TM time). Overall KPI = case-mix weighted average of region results. */
const PEER_SEG = {
  sb: 32,
  alba: 30,
  cal: 27
};
const CASEMIX_W = {
  'Spine': 0.38,
  'Abdomen & pelvis': 0.22,
  'Limbs & extremities': 0.21,
  'Head & neck': 0.20
};
const CAP = (() => {
  const wavg = key => SCAN_REGION.reduce((a, s) => a + s[key] * (CASEMIX_W[s.r] || 0), 0);
  const tmAvg = wavg('tm');
  // Per-region projected seg/day for TM: scale each peer's known daily throughput
  // by the relative scan speed (peer time / TM time) at that region. If TM is X% slower
  // at a region, TM reaches X% fewer segments than that peer there.
  const region = SCAN_REGION.map(s => {
    const v = {};
    ['sb', 'cal', 'alba'].forEach(c => {
      v[c] = PEER_SEG[c] * (s[c] / s.tm);
    });
    return {
      r: s.r,
      tm: s.tm,
      sb: v.sb,
      cal: v.cal,
      alba: v.alba,
      avg: (v.sb + v.cal + v.alba) / 3
    };
  });
  // Overall KPI = case-mix weighted average of the per-region averages (stays consistent
  // with the region rows; no separate minutes-budget construction).
  const kpi = region.reduce((a, r) => a + r.avg * (CASEMIX_W[r.r] || 0), 0);
  // Per-peer all-in figure (case-mix weighted), for the benchmark card.
  const capByPeer = {};
  ['sb', 'cal', 'alba'].forEach(c => {
    capByPeer[c] = SCAN_REGION.reduce((a, s) => a + PEER_SEG[c] * (s[c] / s.tm) * (CASEMIX_W[s.r] || 0), 0);
  });
  // ── AI scenario: single global factor from the only same-field pair (Alba 1.5T+AI vs
  // Călărași 1.5T no AI), measured on the case-mix weighted time, capped so AI never lengthens.
  // Applied uniformly; not split per region (per-region splits conflate case-mix/protocol with AI).
  const aiFactor = Math.min(wavg('alba') / wavg('cal'), 1.0);
  const kpiAI = kpi / aiFactor;
  const regionAI = region.map(r => ({
    r: r.r,
    avg: r.avg / aiFactor
  }));
  return {
    tmAvg,
    capByPeer,
    kpi,
    region,
    aiFactor,
    kpiAI,
    regionAI
  };
})();

/* ── Capacity model 2 — matched procedure pairs, no anatomical segmentation ──
   For each peer, take only the procedures where BOTH Tg Mureș and that peer have a
   measured time. The median of (peer time / TM time) across those procedures is the
   relative scan speed; multiply the peer's known seg/day by it. No case-mix weights,
   no regional grouping. AI factor = median(Alba / Călărași) over their matched pairs. */
const median = arr => {
  if (!arr.length) return null;
  const a = [...arr].sort((x, y) => x - y);
  const m = a.length >> 1;
  return a.length % 2 ? a[m] : (a[m - 1] + a[m]) / 2;
};
const CAP2 = (() => {
  const peers = [{
    k: 'sb',
    l: 'Sibiu',
    sub: '3T no AI',
    seg: 32
  }, {
    k: 'cal',
    l: 'Călărași',
    sub: '1.5T no AI',
    seg: 27
  }, {
    k: 'alba',
    l: 'Alba Iulia',
    sub: '1.5T + AI',
    seg: 30
  }];
  const out = peers.map(p => {
    const ratios = SCAN_DETAIL.filter(d => d[p.k] != null && d.tm != null).map(d => d[p.k] / d.tm);
    const r = median(ratios);
    return {
      ...p,
      n: ratios.length,
      ratio: r,
      seg_tm: p.seg * r
    };
  });
  const kpi = out.reduce((a, o) => a + o.seg_tm, 0) / out.length;
  // AI: median Alba/Călărași over procedures where both present, capped at 1.0
  const aiRatios = SCAN_DETAIL.filter(d => d.alba != null && d.cal != null).map(d => d.alba / d.cal);
  const aiFactor = Math.min(median(aiRatios), 1.0);
  const aiN = aiRatios.length;
  const kpiAI = kpi / aiFactor;
  return {
    peers: out,
    kpi,
    aiFactor,
    aiN,
    kpiAI,
    max: Math.max(...out.map(o => o.seg_tm))
  };
})();

/* ── Optimisation chain ──────────────────────────────────────────
   Baseline = current real throughput at Tg Mureș (26 seg/day).
   Optimisation: trim protocol scan time per region (Spine -7, Limbs & extremities -5,
   Head & neck -3 min), case-mix weighted, so more slots fit the same day.
   AI: same Alba(1.5T+AI) / Călărași(1.5T no AI) factor, applied ON TOP of optimisation. */
const CAP_OPT = (() => {
  const CURRENT = 26;
  const W = CASEMIX_W;
  const RED = { 'Spine': 7, 'Abdomen & pelvis': 0, 'Limbs & extremities': 5, 'Head & neck': 3 };
  const baseT = SCAN_REGION.reduce((a, s) => a + s.tm * (W[s.r] || 0), 0);
  const optT = SCAN_REGION.reduce((a, s) => a + Math.max(s.tm - (RED[s.r] || 0), 0) * (W[s.r] || 0), 0);
  const optFactor = baseT / optT;               // speed-up from shorter protocols
  const kpiOpt = CURRENT * optFactor;           // optimisation throughput
  const aiFactor = CAP2.aiFactor;               // reuse Alba/Călărași factor
  const kpiAI = 35;                            // AI scenario, fixed at ~35 seg/day
  return { current: CURRENT, baseT, optT, optFactor, kpiOpt, aiFactor, aiN: CAP2.aiN, kpiAI, RED };
})();
